<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e1e0c"/>
      <stop offset="55%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0e0a05"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4bd6f"/>
      <stop offset="100%" stop-color="#b87728" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8a94a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8a94a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="60" cy="60" r="60"/>
    </clipPath>
  </defs>
  <circle cx="60" cy="60" r="60" fill="url(#bg)"/>
  <g clip-path="url(#circle)">
    <circle cx="60" cy="60" r="60" fill="url(#glow)"/>
    <rect x="29" y="42" width="10" height="36" rx="5" fill="url(#bar)"/>
    <rect x="43" y="30" width="10" height="60" rx="5" fill="url(#bar)"/>
    <rect x="57" y="20" width="10" height="80" rx="5" fill="url(#bar)"/>
    <rect x="71" y="30" width="10" height="60" rx="5" fill="url(#bar)"/>
    <rect x="85" y="42" width="10" height="36" rx="5" fill="url(#bar)"/>
  </g>
</svg>